# planets.yaml
# Based on ADR 0005: Market/Economy System for Space-Western Trading Game
# Planet types with their supply/demand patterns as specified in ADR 0005

- id: earth
  orbit_radius: 1.0
  orbit_period: 12  # months
  planet_type: Agricultural
  # Optional: Override default produces/demands if needed
  # produces: [Water, Foodstuffs]
  # demands: [Medicine, Firearms, Ammunition, Electronics]

- id: mars
  orbit_radius: 1.5
  orbit_period: 18  # months
  planet_type: Mega City
  # Optional: Override default produces/demands if needed
  # produces: [Electronics, Medicine, Narcotics]
  # demands: [Water, Foodstuffs, Firearms, Ammunition]

- id: ceres
