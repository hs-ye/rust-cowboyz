# List of goods to be traded in the game
# Based on ADR 0005: Market/Economy System for Space-Western Trading Game
- name: Water
  description: Essential for survival, low value but high demand on dry worlds
  base_value: 10

- name: Foodstuffs
  description: Combination of grain, meat, and spices - staple nutrition sources
  base_value: 20

- name: Medicine
  description: Medical supplies, high value, essential for health
  base_value: 100

- name: Firearms
  description: Weapons for protection/offense, high value on dangerous worlds
  base_value: 150

- name: Ammunition
  description: Weapon accessories, consumed regularly, moderate value
  base_value: 50

- name: Metals
  description: Raw materials for construction and manufacturing
  base_value: 60

- name: Antimatter
  description: Advanced raw material for energy production, high value
  base_value: 300

- name: Electronics
  description: High-tech components, essential for advanced civilizations
  base_value: 120

- name: Narcotics
  description: Illegal substances, high value but risky to trade
  base_value: 400

- name: Alien Artefacts
  description: Rare and mysterious items from ancient civilizations, extremely high value and risky to trade
  base_value: 800