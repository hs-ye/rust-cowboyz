<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空牛仔 - Rust Cowboyz</title>
    <link data-trunk rel="rust" data-target-name="cowboyz" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Space-Western Color Palette */
            --bg-dark: #0a0e17;
            --bg-panel: #121a2e;
            --bg-panel-hover: #1a2540;
            --border-color: #2a3a5e;
            --accent-cyan: #00d4ff;
            --accent-purple: #7b2ff7;
            --accent-orange: #ff6b35;
            --accent-green: #00ff88;
            --accent-red: #ff4757;
            --text-primary: #e8eaf0;
            --text-secondary: #8892a8;
            --text-muted: #4a5568;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Main App Container */
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .app-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.1), rgba(123, 47, 247, 0.1));
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .app-header h1 {
            font-size: 1.75rem;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-header .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Split Layout - 60/40 */
        .split-layout {
            display: grid;
            grid-template-columns: 60% 40%;
            gap: 1rem;
            flex: 1;
            min-height: 0;
        }

        /* Map Panel (Left - 60%) */
        .map-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
        }

        .panel-header h2, .panel-header h3 {
            color: var(--accent-cyan);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .panel-subtitle {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .map-viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: 
                radial-gradient(ellipse at center, rgba(0, 212, 255, 0.05) 0%, transparent 70%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.1) 100%);
        }

        .map-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .map-placeholder .sun {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffd700 0%, #ff8c00 50%, transparent 70%);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 40px rgba(255, 200, 0, 0.5);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .map-placeholder .hint {
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        /* Info Panels Container (Right - 40%) */
        .info-panels {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            overflow-y: auto;
        }

        /* Individual Panels */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .panel .panel-header {
            padding: 0.75rem 1rem;
        }

        .panel .panel-header h3 {
            font-size: 0.95rem;
        }

        .panel-content {
            padding: 0.75rem 1rem;
        }

        /* Player Panel */
        .player-panel {
            border-left: 3px solid var(--accent-cyan);
        }

        /* Ship Panel */
        .ship-panel {
            border-left: 3px solid var(--accent-orange);
        }

        /* Inventory Panel */
        .inventory-panel {
            border-left: 3px solid var(--accent-purple);
        }

        /* Market Panel */
        .market-panel {
            border-left: 3px solid var(--accent-green);
            flex: 1;
        }

        /* Stats */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.35rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .stat-value {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stat-value.credits {
            color: var(--accent-green);
        }

        .stat-value.location {
            color: var(--accent-cyan);
        }

        .stat-value.turn {
            color: var(--accent-purple);
        }

        .stat-value.fuel {
            color: var(--accent-orange);
        }

        /* Progress Bars */
        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 0.25rem 0 0.75rem 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .fuel-fill {
            background: linear-gradient(90deg, var(--accent-orange), #ffaa00);
        }

        .cargo-fill {
            background: linear-gradient(90deg, var(--accent-purple), #a855f7);
        }

        /* Inventory */
        .inventory-empty {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
        }

        .inventory-empty .hint {
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        /* Market Table */
        .market-table {
            font-size: 0.85rem;
        }

        .market-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .market-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
        }

        .market-row:hover {
            background: var(--bg-panel-hover);
        }

        .buy-price {
            color: var(--accent-red);
        }

        .sell-price {
            color: var(--accent-green);
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 0.75rem;
            padding: 1rem 0;
            margin-top: auto;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 47, 247, 0.2));
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(123, 47, 247, 0.3));
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
        }

        .btn-icon {
            font-size: 1.1rem;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .split-layout {
                grid-template-columns: 55% 45%;
            }
        }

        @media (max-width: 768px) {
            /* Portrait mode: Map on top, panels on bottom */
            .split-layout {
                grid-template-columns: 1fr;
                grid-template-rows: 50vh auto;
            }

            .map-panel {
                min-height: 40vh;
            }

            .info-panels {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .info-panels .panel {
                flex: 1 1 calc(50% - 0.375rem);
                min-width: 200px;
            }

            .market-panel {
                flex: 1 1 100%;
            }

            .actions {
                flex-wrap: wrap;
            }

            .action-btn {
                flex: 1 1 calc(50% - 0.375rem);
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 0.5rem;
            }

            .app-header {
                flex-direction: column;
                text-align: center;
                gap: 0.25rem;
            }

            .app-header h1 {
                font-size: 1.5rem;
            }

            .info-panels .panel {
                flex: 1 1 100%;
            }

            .action-btn {
                flex: 1 1 100%;
            }

            .market-header, .market-row {
                font-size: 0.75rem;
            }
        }

        /* Solar Map Component Styles */
        .solar-map-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .solar-map-canvas {
            width: 100%;
            height: 100%;
            min-height: 300px;
            border-radius: 8px;
            cursor: pointer;
        }

        .map-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .legend-title {
            font-weight: 600;
            color: var(--text-primary);
            width: 100%;
            margin-bottom: 0.25rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .legend-marker {
            color: var(--accent-green);
            font-size: 0.9rem;
        }

        .player-indicator {
            margin-left: auto;
        }

        /* Selected Planet Panel */
        .selected-planet-panel {
            border-left: 3px solid var(--accent-purple);
        }

        .planet-info {
            padding: 0.25rem 0;
        }

        .planet-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-cyan);
            margin-bottom: 0.25rem;
        }

        .planet-type {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .planet-stats {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .no-selection {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
        }

        .no-selection .hint {
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.1), rgba(123, 47, 247, 0.1));
            position: relative;
        }

        .modal-header h2 {
            color: var(--accent-cyan);
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .modal-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .modal-close {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            line-height: 1;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1.25rem;
        }

        .modal-footer {
            display: flex;
            gap: 0.75rem;
            padding: 1.25rem;
            border-top: 1px solid var(--border-color);
            justify-content: flex-end;
        }

        /* Warning Box */
        .warning-box {
            display: flex;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid var(--accent-red);
            border-radius: 8px;
            margin-bottom: 1.25rem;
        }

        .warning-box.hidden {
            display: none;
        }

        .warning-icon {
            font-size: 1.5rem;
            color: var(--accent-red);
        }

        .warning-text {
            flex: 1;
        }

        .warning-text strong {
            color: var(--accent-red);
            display: block;
            margin-bottom: 0.25rem;
        }

        .warning-text p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .warning-text .hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* Form Sections */
        .form-section {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Difficulty Options */
        .difficulty-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .difficulty-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.75rem 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .difficulty-btn:hover {
            background: var(--bg-panel-hover);
            border-color: var(--accent-cyan);
        }

        .difficulty-btn.selected {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 47, 247, 0.2));
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .difficulty-name {
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .difficulty-bonus {
            color: var(--accent-green);
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        /* Credits Display */
        .credits-display {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--accent-green);
            border-radius: 8px;
        }

        .credits-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .credits-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* Turn Limit Display */
        .turn-limit-display {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            background: rgba(123, 47, 247, 0.1);
            border: 1px solid var(--accent-purple);
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }

        .turn-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-purple);
        }

        .turn-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* Turn Slider */
        .turn-slider-container {
            padding: 0 0.5rem;
        }

        .turn-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        .turn-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-purple);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(123, 47, 247, 0.5);
        }

        .turn-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent-purple);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(123, 47, 247, 0.5);
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-panel-hover);
            border-color: var(--text-secondary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--accent-red), #ff6b6b);
        }

        .btn-warning:hover {
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        /* Responsive Modal */
        @media (max-width: 480px) {
            .modal-content {
                width: 95%;
                margin: 0.5rem;
            }

            .difficulty-options {
                grid-template-columns: 1fr;
            }

            .modal-footer {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* Travel Panel */
        .travel-panel {
            border-left: 3px solid var(--accent-orange);
        }

        .travel-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .travel-destination {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent-cyan);
            border-radius: 8px;
        }

        .travel-icon {
            font-size: 1.5rem;
        }

        .destination-details {
            flex: 1;
        }

        .destination-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-cyan);
        }

        .destination-type {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .travel-costs {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .cost-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cost-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .cost-value {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .cost-value.fuel-ok {
            color: var(--accent-green);
        }

        .cost-value.fuel-low {
            color: var(--accent-red);
        }

        .fuel-indicator {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .fuel-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .fuel-bar .fuel-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .fuel-warning {
            padding: 0.5rem;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid var(--accent-red);
            border-radius: 6px;
            color: var(--accent-red);
            font-size: 0.85rem;
            text-align: center;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .travel-turn-info {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.75rem;
            background: rgba(123, 47, 247, 0.1);
            border: 1px solid var(--accent-purple);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .travel-turn-info .turn-value {
            color: var(--accent-purple);
            font-weight: 600;
        }

        .travel-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .travel-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
        }

        .travel-btn.confirm {
            background: linear-gradient(135deg, var(--accent-green), #00cc6a);
            color: white;
            border: none;
        }

        .travel-btn.confirm:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        .travel-btn.confirm:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            cursor: not-allowed;
            border: 1px solid var(--border-color);
        }

        .travel-btn.cancel {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }

        .travel-btn.cancel:hover {
            background: var(--bg-panel-hover);
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .travel-no-selection,
        .travel-already-there {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
        }

        .travel-no-selection .travel-icon,
        .travel-already-there .travel-icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .travel-already-there {
            color: var(--accent-green);
        }

        /* Travel Animation Overlay */
        .travel-animation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .travel-animation-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
        }

        .travel-ship {
            font-size: 4rem;
            animation: shipFly 2s ease-in-out infinite;
        }

        @keyframes shipFly {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-5deg); }
            75% { transform: translateY(10px) rotate(5deg); }
        }

        .travel-route {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .travel-route .origin,
        .travel-route .destination {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .route-line {
            width: 150px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .route-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 2px;
            animation: progressMove 2s ease-in-out forwards;
        }

        @keyframes progressMove {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        .travel-status {
            font-size: 1.25rem;
            color: var(--accent-cyan);
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Travel complete animation */
        .travel-complete {
            animation: travelComplete 0.5s ease-out forwards;
        }

        @keyframes travelComplete {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
